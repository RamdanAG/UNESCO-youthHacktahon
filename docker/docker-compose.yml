version: "3.9"

services:
  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    env_file:
      - ../frontend/.env.example
    depends_on:
      - backend

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env.example
    depends_on:
      - ai

  ai:
    build: ../ai
    ports:
      - "8001:8001"
    env_file:
      - ../ai/.env.example

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
